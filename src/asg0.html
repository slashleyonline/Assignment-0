<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>

    <div> 
      v1:
      x:<input type = 'text' id = 'xInput1' value = '2.25'></input>
      y:<input type = 'text' id = 'yInput1' value = '2.25'></input>

      <br></br>

      v2:
      x:<input type = 'text' id = 'xInput2' value = '-2.25'></input>
      y:<input type = 'text' id = 'yInput2' value = '2.25'></input>
      <button id = 'drawButton'>Draw</button>
    </div>

    <div>
      <h1>Operation:</h1>
      <select id="operations">
        <option value="add">add</option>
        <option value="subtract">subtract</option>
        <option value="multiply">multiply</option>
        <option value="divide">divide</option>
        <option value="magnitude">magnitude</option>
        <option value="normalize">normalize</option>
        <option value="angle between">angle between</option>
        <option value="cross product">cross product</option>
        <option value="area">area</option>
      </select>
      scalar: <input type = 'text' id = 'scalar' value = '1'>
      <button id = 'opDrawButton'>Draw</button>

    </div>

  </body>
</html>
